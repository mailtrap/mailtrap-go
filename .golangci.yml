version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - examples/

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - examples/
